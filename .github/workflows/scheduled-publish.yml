# Automatically publishes scheduled articles.
#
# The PUPA site is a static build, so a future-dated article only appears
# after a build runs on/after its date. This workflow pushes an empty commit
# on the 1st and 15th of each month, which triggers Cloudflare's normal
# build-on-push. The future-date filter (src/utils/published.ts) then reveals
# any article whose date has arrived — no manual step needed.
#
# You can also publish on demand: Actions tab -> "Publish scheduled articles"
# -> "Run workflow".

name: Publish scheduled articles

on:
  schedule:
    # Times are UTC. 01:00 UTC = 08:00 WIB (Jakarta).
    # Runs on the 1st (publish day) plus the 2nd and 3rd as backups, so a
    # rare GitHub scheduler delay can't cause an article to miss the 1st.
    - cron: "0 1 1-3 * *"   # 1st, 2nd, 3rd of every month, 08:00 WIB
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: scheduled-publish
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Push an empty commit to trigger a Cloudflare rebuild
        run: |
          git config user.name "pupa-scheduler"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled rebuild to publish dated articles"
          git push
